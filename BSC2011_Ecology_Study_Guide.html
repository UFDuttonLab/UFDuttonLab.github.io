    { name: 'Exponential Growth',
      eq: 'dN/dt = r_max × N',
      terms: [
        '<strong>dN/dt</strong> = rate of change in population size over time',
        '<strong>r_max</strong> = maximum per capita rate of increase (intrinsic rate)',
        '<strong>N</strong> = current population size',
      ],
      usage: 'Describes unlimited, J-shaped growth. Use when resources are abundant and there is no carrying capacity — e.g., a species colonizing a new, empty habitat. The larger N gets, the faster the population grows.' },
    { name: 'Logistic Growth',
      eq: 'dN/dt = r_max × N × (K − N) / K',
      terms: [
        '<strong>dN/dt</strong> = rate of change in population size over time',
        '<strong>r_max</strong> = maximum per capita rate of increase',
        '<strong>N</strong> = current population size',
        '<strong>K</strong> = carrying capacity (max population the environment supports)',
        '<strong>(K − N) / K</strong> = fraction of carrying capacity remaining; slows growth as N → K',
      ],
      usage: 'Describes density-dependent, S-shaped growth. The key term is (K−N)/K: when N is small it is near 1 (growth is near exponential); when N = K it equals 0 (growth stops). Use this model when resources are limited.' },
    { name: 'Lincoln–Petersen Mark-Recapture',
      eq: 'N = (M × C) / R',
      terms: [
        '<strong>N</strong> = estimated total population size',
        '<strong>M</strong> = number of individuals marked and released in the first sample',
        '<strong>C</strong> = total number of individuals captured in the second sample',
        '<strong>R</strong> = number of marked (recaptured) individuals in the second sample',
      ],
      usage: 'Estimates population size from two sampling events. Key trap: M is the number actually <em>marked</em>, not the number captured. If some escaped before marking, use only those successfully marked.' },
    { name: 'Lindeman\'s 10% Rule',
      eq: '~10% of energy transfers between trophic levels',
      terms: [
        '<strong>10%</strong> = approximate efficiency of energy transfer from one trophic level to the next',
        '<strong>~90%</strong> = energy lost as metabolic heat at each level',
      ],
      usage: 'Use to calculate energy available at higher trophic levels. Example: if producers capture 1,000,000 kcal, then primary consumers get ~100,000, secondary consumers ~10,000, and tertiary consumers ~1,000 kcal. Multiply by 0.10 for each step up.' },
    { name: 'Net Primary Productivity',
      eq: 'NPP = GPP − R_plant',
      terms: [
        '<strong>NPP</strong> = net primary productivity (energy stored as new plant biomass)',
        '<strong>GPP</strong> = gross primary productivity (total energy captured by photosynthesis)',
        '<strong>R_plant</strong> = energy used by plants for their own cellular respiration',
      ],
      usage: 'NPP represents what is actually available to consumers. GPP is total photosynthesis; plants "burn" some of that for their own metabolism. Tropical forests have the highest terrestrial NPP.' },
    { name: 'Shannon Diversity Index',
      eq: 'H\' = −Σ (p_i × ln p_i)',
      terms: [
        '<strong>H\'</strong> = Shannon diversity index value (higher = more diverse)',
        '<strong>p_i</strong> = proportion of total individuals belonging to species i',
        '<strong>ln</strong> = natural logarithm',
        '<strong>Σ</strong> = sum over all species in the community',
      ],
      usage: 'Measures both species richness (number of species) and evenness (how equal their abundances are). A community with 10 equally abundant species has higher H\' than one where a single species dominates. Useful for comparing diversity across communities.' },
    { name: 'Effective Population Size',
      eq: 'N_e = 4(N_m × N_f) / (N_m + N_f)',
      terms: [
        '<strong>N_e</strong> = effective population size (genetic "equivalent" population)',
        '<strong>N_m</strong> = number of breeding males',
        '<strong>N_f</strong> = number of breeding females',
      ],
      usage: 'Measures how many individuals actually contribute genes to the next generation. Equal sex ratios maximize N_e. A population of 100 with 50M/50F has N_e = 100; but 10M/90F has N_e = only 36 — much more vulnerable to genetic drift and inbreeding.' },
    { name: 'BIDE Model (Open Population)',
      eq: 'N(t+1) = N(t) + B + I − D − E',
      terms: [
        '<strong>N(t)</strong> = population size at time t',
        '<strong>B</strong> = births during the time interval',
        '<strong>I</strong> = immigrants arriving from other populations',
        '<strong>D</strong> = deaths during the time interval',
        '<strong>E</strong> = emigrants leaving for other populations',
      ],
      usage: 'Extends the simple birth-death model to open populations connected by movement. Use for metapopulation questions. Source populations have B + I > D + E; sink populations have B + I < D + E and depend on immigration to persist.' },
  ];
  container.innerHTML = `
    <h2 style="margin-bottom:6px;font-size:1.15rem;color:var(--uf-blue);">Formula Reference</h2>
    <p style="color:var(--muted);margin-bottom:20px;font-size:0.9rem;">These formulas will also be provided on the front page of your exam.</p>

      </div>
      <div class="usage"><strong>When to use it:</strong> ${f.usage}</div>
    </article>
  `).join('')}</div>`;
}

function showAchievement(icon, text) {
  const toast = document.createElement('div');
  toast.className = 'achievement-toast';
  toast.setAttribute('role', 'alert');
  toast.setAttribute('aria-live', 'assertive');
  toast.innerHTML = `<div class="icon">${icon}</div><div class="text">${text}</div>`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

function createConfetti() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  for (let i = 0; i < 20; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.background = ['#0021A5', '#FA4616', '#16a34a'][Math.floor(Math.random() * 3)];
    confetti.style.animation = `confettiFall ${2 + Math.random() * 1}s ease-in forwards`;
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 3000);
  }
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
